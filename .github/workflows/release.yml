name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Bump version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content .\SiapControl.csproj
          $propertyGroup = $project.SelectSingleNode("/Project/PropertyGroup[FileVersion or AssemblyVersion]")
          if ($null -eq $propertyGroup) {
            $propertyGroup = $project.SelectSingleNode("/Project/PropertyGroup[1]")
          }
          if ($null -eq $propertyGroup) {
            throw "No PropertyGroup found in SiapControl.csproj."
          }

          $fileVersionNode = $propertyGroup.SelectSingleNode("FileVersion")
          $currentText = if ($null -eq $fileVersionNode) { $null } else { $fileVersionNode.InnerText }
          if ([string]::IsNullOrWhiteSpace($currentText)) {
            $assemblyVersionNode = $propertyGroup.SelectSingleNode("AssemblyVersion")
            $currentText = if ($null -eq $assemblyVersionNode) { $null } else { $assemblyVersionNode.InnerText }
          }
          if ([string]::IsNullOrWhiteSpace($currentText)) {
            throw "No FileVersion or AssemblyVersion found in SiapControl.csproj."
          }

          $current = [Version]$currentText
          $build = if ($current.Build -lt 0) { 0 } else { $current.Build }
          $revision = if ($current.Revision -lt 0) { 1 } else { $current.Revision + 1 }
          $next = [Version]::new($current.Major, $current.Minor, $build, $revision)
          $nextText = $next.ToString()

          function Set-ProjectProperty([System.Xml.XmlElement]$group, [string]$name, [string]$value) {
            $node = $group.SelectSingleNode($name)
            if ($null -eq $node) {
              $node = $project.CreateElement($name)
              $group.AppendChild($node) | Out-Null
            }
            $node.InnerText = $value
          }

          Set-ProjectProperty $propertyGroup "AssemblyVersion" $nextText
          Set-ProjectProperty $propertyGroup "FileVersion" $nextText
          Set-ProjectProperty $propertyGroup "Version" $nextText

          $project.Save((Resolve-Path .\SiapControl.csproj))
          "VERSION=$nextText" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$nextText" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SiapControl.csproj
          git commit -m "chore: bump version to v${env:VERSION} [skip release]"
          git push

      - name: Restore
        run: nuget restore SiapControl.sln

      - name: Build
        run: msbuild SiapControl.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Test
        run: dotnet test SiapControl.Tests\SiapControl.Tests.csproj --configuration Release --no-build

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts -Force | Out-Null
          Compress-Archive -Path .\bin\Release\net48\* -DestinationPath .\artifacts\SiapControl.zip -Force

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $target = git rev-parse HEAD
          gh release create "v${env:VERSION}" ".\artifacts\SiapControl.zip" `
            --target $target `
            --title "SiapControl v${env:VERSION}" `
            --notes "Build automático desde main."
