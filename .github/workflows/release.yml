name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Bump version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content .\SiapControl.csproj
          $propertyGroup = $project.Project.PropertyGroup[0]
          $current = [Version]$propertyGroup.FileVersion
          $next = [Version]::new($current.Major, $current.Minor, $current.Build, $current.Revision + 1)
          $nextText = $next.ToString()

          $propertyGroup.AssemblyVersion = $nextText
          $propertyGroup.FileVersion = $nextText
          if ($propertyGroup.Version -eq $null) {
            $versionElement = $project.CreateElement("Version")
            $versionElement.InnerText = $nextText
            $propertyGroup.AppendChild($versionElement) | Out-Null
          } else {
            $propertyGroup.Version = $nextText
          }

          $project.Save((Resolve-Path .\SiapControl.csproj))
          "VERSION=$nextText" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$nextText" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SiapControl.csproj
          git commit -m "chore: bump version to v${env:VERSION} [skip release]"
          git push

      - name: Restore
        run: nuget restore SiapControl.sln

      - name: Build
        run: msbuild SiapControl.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Test
        run: dotnet test SiapControl.Tests\SiapControl.Tests.csproj --configuration Release --no-build

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts -Force | Out-Null
          Compress-Archive -Path .\bin\Release\net48\* -DestinationPath .\artifacts\SiapControl.zip -Force

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $target = git rev-parse HEAD
          gh release create "v${env:VERSION}" ".\artifacts\SiapControl.zip" `
            --target $target `
            --title "SiapControl v${env:VERSION}" `
            --notes "Build automático desde main."
