name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore SiapControl.sln

      - name: Build
        run: msbuild SiapControl.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Test
        run: dotnet test SiapControl.Tests\SiapControl.Tests.csproj --configuration Release --no-build
